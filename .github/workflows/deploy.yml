name: Deploy to Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Pages serves 404.html for any unknown path. Copying the app shell there keeps the old
      # Vercel SPA rewrite behaviour, so a stray /t/<code> boots the app instead of a GitHub 404.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
